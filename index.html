<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking Pro Max</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: Poppins;
  background: linear-gradient(135deg,#000428,#004e92);
  color: white;
  text-align: center;
  min-height;100vh:
}

.container {
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin: 10px auto;
  width: 300px;
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 10px;
}

button {
  padding: 10px;
  width: 90%;
  margin: 5px;
  cursor: pointer;
}

.admin {
  display: none;
}
</style>

</head>

<body>

<h1>🔥 Booking System</h1>

<div class="container">

<div class="card">
<h3>Book Appointment</h3>

<input id="name" placeholder="Name">
<input id="date" type="date">

<select id="service">
<option>Service</option>
<option>Haircut</option>
<option>Facial</option>
</select>

<button onclick="book()">Book on WhatsApp</button>
<button onclick="pay()">Pay Now</button>
</div>

<div class="card">
<button onclick="showAdmin()">🔐 Admin Panel</button>
</div>

<div class="card admin" id="adminPanel">
<h3>📊 Bookings</h3>
<ul id="data"></ul>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
